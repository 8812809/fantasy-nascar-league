<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Segment Standings | Fantasy NASCAR League</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Fantasy NASCAR League</h1>
  <nav>
    <a href="index.html">Home</a>
    <a class="active" href="standings.html">Standings</a>
    <a href="teams.html">Teams</a>
    <a href="results.html">Race Results</a>
    <a href="schedule.html">Schedule</a>
    <a href="rules.html">Rules</a>
    <a href="history.html">History</a>
  </nav>
</header>
<main>
  <section class="card">
    <h2>Segment 2 Standings — After Echo Park Speedway</h2>
    <p class="muted">Eight races completed. North Wilkesboro Speedway is next.</p>
    <div class="scroll"><table>
      <thead><tr><th>Rank</th><th>Team</th><th>Weekly Points</th><th>Segment Points</th><th>Behind</th></tr></thead>
      <tbody id="standings-body"></tbody>
    </table></div>
  </section>
</main>
<div class="footer">Fantasy NASCAR League is an independent private fantasy league site.</div>
<script src="league-data-race8.js?v=20260714-r8"></script>
<script>
(function(){
 const d=window.LEAGUE_DATA;
 const body=document.getElementById('standings-body');
 if(!d || !Array.isArray(d.standings)){body.innerHTML='<tr><td colspan="5">Could not load standings.</td></tr>';return;}
 const leader=Number(d.standings[0]?.segment_points||0);
 body.innerHTML=d.standings.map((s,i)=>{
   const pts=Number(s.segment_points||0);
   const behind=i===0?'—':(leader-pts);
   const weekly=s.weekly_points ?? s.current_week ?? s.latest_week ?? ((s.weekly_scores||{})['Echo Park Speedway']) ?? '—';
   const display=s.display_name || ('Team '+(s.team_id||'')+' '+(s.team||''));
   return `<tr><td>${s.rank||i+1}</td><td><strong>${display}</strong></td><td class="num">${weekly}</td><td class="num"><strong>${pts}</strong></td><td class="num">${behind}</td></tr>`;
 }).join('');
})();
</script>
</body>
</html>
