<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Standings | Fantasy NASCAR League</title><style>
:root{--bg:#f4f4f4;--text:#222;--dark:#111;--mid:#222;--soft:#fff7d6;--border:#ddd}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);font-size:17px}header{background:#111;color:#fff;padding:18px;text-align:center}.menu-wrap{background:#222;padding:10px 16px}details{max-width:560px;margin:auto}summary{cursor:pointer;color:#fff;font-weight:bold;font-size:1.25rem;padding:15px 20px;background:#333;border-radius:10px;text-align:center}nav{margin-top:8px;background:#fff;border-radius:8px;overflow:hidden}nav a{display:block;padding:15px 18px;color:#111;text-decoration:none;border-bottom:1px solid #eee;font-weight:bold}nav a.active{background:var(--soft)}main{max-width:1050px;margin:auto;padding:18px 14px 40px}.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:18px;box-shadow:0 2px 8px #0002}h2{border-bottom:3px solid #111;padding-bottom:8px}.scroll{overflow-x:auto}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{padding:10px;border:1px solid var(--border);text-align:left}th{background:#111;color:#fff}tr:nth-child(even){background:#fafafa}.right{text-align:right}.center{text-align:center}.footer{text-align:center;color:#666;padding:20px}.error{background:#fde8e8;padding:12px;border-radius:8px}
</style></head><body><header><h1>Standings</h1><p>Current segment standings and weekly side-bet tracking.</p></header><div class="menu-wrap"><details><summary>☰ Menu</summary><nav><a href="index.html">Home</a><a class="active" href="standings.html">Standings</a><a href="teams.html">Teams</a><a href="results.html">Race Results</a><a href="schedule.html">Schedule</a><a href="rules.html">Rules</a><a href="history.html">History</a></nav></details></div><main><section class="card"><h2 id="heading">Current Segment Standings</h2><p id="status"></p><div id="standings-table" class="scroll"></div></section><section class="card"><h2>Weekly Side-Bet Winners</h2><div id="weekly-winners" class="scroll"></div></section></main><div class="footer">Fantasy NASCAR League is an independent private fantasy league site.</div><script src="league-data.js?v=20260723-race9-final"></script><script>
(function(){const d=window.LEAGUE_DATA;if(!d){document.getElementById('standings-table').innerHTML='<p class="error">Could not load league-data.js.</p>';return;}document.getElementById('heading').textContent=`Segment ${d.segment} Standings — After ${d.current_race}`;document.getElementById('status').textContent=`${d.races_completed} races completed. ${d.next_race} is next.`;const rows=(d.standings||[]).map(s=>`<tr><td>${s.rank}</td><td>${s.display_name||('Team '+s.team_id+' '+s.team)}</td><td class="right">${s.segment_points}</td><td class="right">${s.behind}</td><td class="center">${s.weekly_wins||'—'}</td></tr>`).join('');document.getElementById('standings-table').innerHTML=`<table><thead><tr><th>Rank</th><th>Team</th><th>Segment Points</th><th>Behind</th><th>Weekly Wins</th></tr></thead><tbody>${rows}</tbody></table>`;const w=(d.weekly_winners||[]).map(x=>`<tr><td>Race ${x.race_number}: ${x.race}</td><td>${x.winner}</td><td class="right">${x.score}</td></tr>`).join('');document.getElementById('weekly-winners').innerHTML=`<table><thead><tr><th>Race</th><th>Winner</th><th>Score</th></tr></thead><tbody>${w}</tbody></table>`;})();
</script></body></html>
