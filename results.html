<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Race Results | Fantasy NASCAR League</title><style>
:root{--bg:#f4f4f4;--border:#d7d7d7;--soft:#fff7d6;--winner:#e6f7ea}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#222;font-size:17px;line-height:1.5}header{background:#111;color:#fff;padding:18px;text-align:center}.menu-wrap{background:#222;padding:10px 16px}details.menu{max-width:560px;margin:auto}summary{cursor:pointer}details.menu>summary{color:#fff;font-weight:bold;font-size:1.25rem;padding:15px 20px;background:#333;border-radius:10px;text-align:center}nav{margin-top:8px;background:#fff;border-radius:8px;overflow:hidden}nav a{display:block;padding:15px 18px;color:#111;text-decoration:none;border-bottom:1px solid #eee;font-weight:bold}nav a.active{background:var(--soft)}main{max-width:1100px;margin:auto;padding:18px 14px 40px}.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:18px;box-shadow:0 2px 8px #0002}h2{border-bottom:3px solid #111;padding-bottom:8px}.button-link{display:inline-block;background:#111;color:#fff;text-decoration:none;padding:10px 14px;border-radius:8px;margin:4px}.scroll{overflow-x:auto}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{padding:9px;border:1px solid var(--border);text-align:left}th{background:#111;color:#fff}tr:nth-child(even){background:#fafafa}.num{text-align:right}.winner{background:var(--winner)!important;font-weight:bold}.footer{text-align:center;color:#666;padding:20px}.muted{color:#666}.error{background:#fde8e8;padding:12px;border-radius:8px}.team-details{border:1px solid var(--border);border-radius:9px;margin:10px 0;overflow:hidden}.team-details>summary{font-weight:bold;padding:12px 14px;background:#f1f1f1}.team-details[open]>summary{border-bottom:1px solid var(--border)}.team-details .scroll{padding:0 12px 12px}.team-total td{font-weight:bold;background:#f7f7f7}.race-winner{font-size:1.05rem}.note{margin-top:8px}
</style></head><body><header><h1>Race Results</h1><p>Weekly team scores and each team’s four-car scoring breakdown.</p></header><div class="menu-wrap"><details class="menu"><summary>☰ Menu</summary><nav><a href="index.html">Home</a><a href="standings.html">Standings</a><a href="teams.html">Teams</a><a class="active" href="results.html">Race Results</a><a href="schedule.html">Schedule</a><a href="rules.html">Rules</a><a href="history.html">History</a></nav></details></div><main><section class="card"><h2>Race Results Summary</h2><p id="updated" class="muted"></p><div id="raceNav"></div></section><div id="resultsArea"></div></main><div class="footer">Fantasy NASCAR League is an independent private fantasy league site.</div><script src="league-data.js?v=20260723-results-repair"></script><script>
(function(){
 const d=window.LEAGUE_DATA, area=document.getElementById('resultsArea');
 if(!d){area.innerHTML='<p class="error">Could not load league-data.js.</p>';return;}
 document.getElementById('updated').textContent=`Updated through ${d.current_race}.`;
 const races=(d.races||[]).filter(r=>/completed/i.test(r.status||''));
 document.getElementById('raceNav').innerHTML=races.map(r=>`<a class="button-link" href="#race-${r.race_number}">Race ${r.race_number}: ${r.name}</a>`).join('');
 const n=v=>v??'—';
 area.innerHTML=races.map(r=>{
  const det=(d.race_results||{})[r.name]||{};
  const rows=(det.team_breakdown||(d.weekly_team_scores||[]).find(x=>x.race===r.name)?.scores||[]).slice().sort((a,b)=>(a.rank||99)-(b.rank||99));
  const summaryRows=rows.map(t=>`<tr class="${t.rank===1?'winner':''}"><td>${n(t.rank)}</td><td>${t.display_name||('Team '+t.team_id+' '+t.team)}</td><td class="num">${n(t.qualifying_points)}</td><td class="num">${n(t.race_points)}</td><td class="num">${n(t.weekly_total??t.points)}</td></tr>`).join('');
  const breakdowns=rows.map(t=>{
   const drivers=t.drivers||[];
   if(!drivers.length)return '';
   const driverRows=drivers.map(x=>`<tr><td>#${n(x.car)}</td><td>${n(x.driver)}</td><td class="num">${n(x.start)}</td><td class="num">${n(x.qualifying_points)}</td><td class="num">${n(x.finish)}</td><td class="num">${n(x.race_points)}</td><td class="num">${n(x.total)}</td></tr>`).join('');
   return `<details class="team-details" ${t.rank===1?'open':''}><summary>${t.display_name||('Team '+t.team_id+' '+t.team)} — ${n(t.weekly_total??t.points)} points</summary><div class="scroll"><table><thead><tr><th>Car</th><th>Driver</th><th>Start</th><th>Qualifying Points</th><th>Finish</th><th>Race Points</th><th>Total</th></tr></thead><tbody>${driverRows}<tr class="team-total"><td colspan="3">Team Total</td><td class="num">${n(t.qualifying_points)}</td><td></td><td class="num">${n(t.race_points)}</td><td class="num">${n(t.weekly_total??t.points)}</td></tr></tbody></table></div></details>`;
  }).join('');
  return `<section class="card" id="race-${r.race_number}"><h2>Race ${r.race_number}: ${r.name}</h2><p class="race-winner"><strong>Weekly Side Bet Winner:</strong> ${r.weekly_winner||det.weekly_winner_display||'—'} — ${r.winning_score||det.winning_score||'—'} points</p><div class="scroll"><table><thead><tr><th>Rank</th><th>Team</th><th>Qualifying Points</th><th>Race Points</th><th>Total</th></tr></thead><tbody>${summaryRows}</tbody></table></div><h3>Team Driver-Car Breakdown</h3><p class="muted note">Select a team to see its four cars. The weekly winner is open automatically.</p>${breakdowns}</section>`;
 }).join('');
})();
</script></body></html>
