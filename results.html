<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Race Results | Fantasy NASCAR League</title><style>
:root{--bg:#f4f4f4;--border:#ddd;--soft:#fff7d6}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#222;font-size:17px;line-height:1.5}header{background:#111;color:#fff;padding:18px;text-align:center}.menu-wrap{background:#222;padding:10px 16px}details{max-width:560px;margin:auto}summary{cursor:pointer;color:#fff;font-weight:bold;font-size:1.25rem;padding:15px 20px;background:#333;border-radius:10px;text-align:center}nav{margin-top:8px;background:#fff;border-radius:8px;overflow:hidden}nav a{display:block;padding:15px 18px;color:#111;text-decoration:none;border-bottom:1px solid #eee;font-weight:bold}nav a.active{background:var(--soft)}main{max-width:1100px;margin:auto;padding:18px 14px 40px}.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:18px;box-shadow:0 2px 8px #0002}h2{border-bottom:3px solid #111;padding-bottom:8px}.button-link{display:inline-block;background:#111;color:#fff;text-decoration:none;padding:10px 14px;border-radius:8px;margin:4px}.scroll{overflow-x:auto}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{padding:9px;border:1px solid var(--border);text-align:left}th{background:#111;color:#fff}tr:nth-child(even){background:#fafafa}.num{text-align:right}.winner{background:#e6f7ea;font-weight:bold}.footer{text-align:center;color:#666;padding:20px}.muted{color:#666}.error{background:#fde8e8;padding:12px;border-radius:8px}
</style></head><body><header><h1>Race Results</h1><p>Weekly team scores broken down by qualifying points, race points, and weekly total.</p></header><div class="menu-wrap"><details><summary>☰ Menu</summary><nav><a href="index.html">Home</a><a href="standings.html">Standings</a><a href="teams.html">Teams</a><a class="active" href="results.html">Race Results</a><a href="schedule.html">Schedule</a><a href="rules.html">Rules</a><a href="history.html">History</a></nav></details></div><main><section class="card"><h2>Race Results Summary</h2><p id="updated" class="muted"></p><div id="raceNav"></div></section><div id="resultsArea"></div></main><div class="footer">Fantasy NASCAR League is an independent private fantasy league site.</div><script src="league-data.js?v=20260723-race9-pdf-results"></script><script>
(function(){const d=window.LEAGUE_DATA;if(!d){document.getElementById('resultsArea').innerHTML='<p class="error">Could not load league-data.js.</p>';return;}document.getElementById('updated').textContent=`Updated through ${d.current_race}.`;const races=(d.races||[]).filter(r=>/completed/i.test(r.status||''));document.getElementById('raceNav').innerHTML=races.map(r=>`<a class="button-link" href="#race-${r.race_number}">Race ${r.race_number}: ${r.name}</a>`).join('');document.getElementById('resultsArea').innerHTML=races.map(r=>{const det=(d.race_results||{})[r.name]||{};let rows=det.team_breakdown||(d.weekly_team_scores||[]).find(x=>x.race===r.name)?.scores||[];let teams=rows.map(t=>`<tr class="${t.rank===1?'winner':''}"><td>${t.rank||''}</td><td>${t.display_name||('Team '+t.team_id+' '+t.team)}</td><td class="num">${t.qualifying_points??'—'}</td><td class="num">${t.race_points??'—'}</td><td class="num">${t.weekly_total??t.points??'—'}</td></tr>`).join('');let drivers=(det.team_breakdown||[]).map(t=>`<h3>${t.display_name||t.team}</h3><div class="scroll"><table><thead><tr><th>Car</th><th>Driver</th><th>Start</th><th>Qualifying</th><th>Finish</th><th>Race</th><th>Total</th></tr></thead><tbody>${(t.drivers||[]).map(x=>`<tr><td>#${x.car}</td><td>${x.driver}</td><td class="num">${x.start}</td><td class="num">${x.qualifying_points}</td><td class="num">${x.finish}</td><td class="num">${x.race_points}</td><td class="num">${x.total}</td></tr>`).join('')}</tbody></table></div>`).join('');let pdfDrivers=(det.driver_results||[]).slice().sort((a,b)=>(a.finish??999)-(b.finish??999));let pdfTable=pdfDrivers.length?`<h3>Jayski / NASCAR PDF Driver Results</h3><p class="muted">Starting position and finishing position from the official race-results PDF, with fantasy qualifying and race points.</p><div class="scroll"><table><thead><tr><th>Finish</th><th>Car</th><th>Driver</th><th>Start</th><th>Qualifying Points</th><th>Race Points</th><th>Total</th></tr></thead><tbody>${pdfDrivers.map(x=>`<tr><td class="num">${x.finish}</td><td>#${x.car}</td><td>${x.driver}</td><td class="num">${x.start}</td><td class="num">${x.qualifying_points}</td><td class="num">${x.race_points}</td><td class="num">${x.total}</td></tr>`).join('')}</tbody></table></div>`:'';return `<section class="card" id="race-${r.race_number}"><h2>Race ${r.race_number}: ${r.name}</h2><p><strong>Weekly Side Bet Winner:</strong> ${r.weekly_winner||det.weekly_winner_display||'—'} — ${r.winning_score||det.winning_score||'—'} points</p><div class="scroll"><table><thead><tr><th>Rank</th><th>Team</th><th>Qualifying</th><th>Race</th><th>Total</th></tr></thead><tbody>${teams}</tbody></table></div>${drivers}${pdfTable}</section>`;}).join('');})();
</script></body></html>
