  <style>
:root{--bg:#f4f4f4;--text:#222;--dark:#111;--mid:#222;--light:#fff;--gold:#d6a600;--soft:#fff7d6;--border:#ddd;--muted:#666;--green:#e6f7ea;--red:#fde8e8;}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;font-size:17px}header{background:var(--dark);color:#fff;padding:18px 16px;text-align:center}header h1{margin:0;font-size:1.9rem;letter-spacing:.5px}header p{margin:6px 0 0;color:#ddd}.menu-wrap{background:var(--mid);padding:10px 16px;text-align:center}details{max-width:560px;margin:0 auto;text-align:left}summary{cursor:pointer;color:#fff;font-weight:bold;font-size:1.25rem;list-style:none;padding:15px 20px;background:#333;border-radius:10px;text-align:center}summary::-webkit-details-marker{display:none}nav{margin-top:8px;background:#fff;border-radius:8px;overflow:hidden;border:1px solid var(--border)}nav a{display:block;padding:15px 18px;color:#111;text-decoration:none;border-bottom:1px solid #eee;font-weight:bold;font-size:1.08rem}nav a:last-child{border-bottom:none}nav a:hover,nav a.active{background:var(--soft)}main{max-width:1050px;margin:0 auto;padding:18px 14px 40px}.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}h2{margin-top:0;border-bottom:3px solid #111;padding-bottom:8px;font-size:1.45rem}h3{margin:12px 0 8px;font-size:1.18rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(235px,1fr));gap:14px}.mini-card{background:#fafafa;border:1px solid var(--border);border-radius:10px;padding:14px}.button-link{display:inline-block;background:#111;color:#fff;text-decoration:none;padding:12px 16px;border-radius:9px;font-weight:bold;margin-top:8px;font-size:1rem}table{width:100%;border-collapse:collapse;margin-top:10px;font-size:1rem}th,td{padding:10px;border:1px solid var(--border);text-align:left;vertical-align:top}th{background:#111;color:#fff}tr:nth-child(even){background:#fafafa}.note{background:var(--soft);border:1px solid var(--gold);border-radius:10px;padding:13px}.locked{background:var(--red);border:1px solid #d88}.eligible{background:var(--green);border:1px solid #8abf95}.muted{color:var(--muted);font-size:.92rem}.champion-box{background:var(--soft);border:2px solid var(--gold);border-radius:12px;padding:16px;text-align:center;font-weight:bold;font-size:1.1rem}.roster{list-style:none;padding:0;margin:8px 0}.roster li{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid #eee;padding:8px 0}.car{font-weight:bold;color:#555;white-space:nowrap}.team-card h3{font-size:1.2rem;margin-top:0}.team-card.locked-team{background:#fff3f3;border:2px solid #d88}.change-note{background:var(--soft);border:1px solid var(--gold);border-radius:8px;padding:9px;margin-top:10px}.drafted{font-weight:bold;color:#555}.changed-car{font-weight:bold;color:#9b0000}.footer{max-width:1050px;margin:0 auto;padding:20px 14px 30px;color:#666;text-align:center;font-size:.85rem;border-top:1px solid #ddd}@media(max-width:600px){body{font-size:16px}header h1{font-size:1.65rem}main{padding:14px 10px 32px}th,td{padding:9px;font-size:.94rem}.card{padding:14px}summary{font-size:1.2rem;padding:15px 20px}}

.status-good{background:var(--green);border:1px solid #8abf95;border-radius:10px;padding:12px;margin-top:10px}.leader{font-size:1.15rem;font-weight:bold}.right{text-align:right}.center{text-align:center}.small{font-size:.9rem}.pill{display:inline-block;border:1px solid var(--border);border-radius:999px;padding:4px 9px;background:#fafafa;margin:2px}.error{background:var(--red);border:1px solid #d88;border-radius:10px;padding:12px} 
</style>
</head>
<body>
  <header><h1>Teams</h1><p>Current rosters and segment points.</p></header>

  <main><section class="card"><h2>Teams & Rosters</h2><div id="teams-grid" class="grid"></div></section></main>
  <div class="footer">Fantasy NASCAR League is an independent private fantasy league site. NASCAR and driver/team names are property of their respective owners.</div>
  <script src="league-data-race8.js?v=20260714-r8"></script>
  <script>
(function(){
 const d=window.LEAGUE_DATA;
 const teamsGrid=document.getElementById('teams-grid');
 if(!d){teamsGrid.innerHTML='<p class="error">Could not load league-data.js.</p>'; return;}
 const carNumbers={'Ross Chastain':'1','Austin Cindric':'2','Kyle Larson':'5','Brad Keselowski':'6','Daniel Suarez':'7','Chase Elliott':'9','Denny Hamlin':'11','Ryan Blaney':'12','Chris Buescher':'17','Chase Briscoe':'19','Christopher Bell':'20','Joey Logano':'22','Bubba Wallace':'23','William Byron':'24','Zane Smith':'38','Erik Jones':'43','Tyler Reddick':'45','Ty Gibbs':'54','Ryan Preece':'60','Michael McDowell':'71','Carson Hocevar':'77','Shane van Gisbergen':'97','Shane Van Gisbergen':'97','Austin Hill':'33'};
 const getDriverName=(dr)=> typeof dr==='string' ? dr : (dr.name || dr.driver || dr.full_name || 'Unknown Driver');
 const getCarNumber=(dr)=> typeof dr==='object' && dr!==null ? (dr.number || dr.car || dr.car_number || dr.no || dr.carNo || '') : (carNumbers[dr] || '');
 const ordinal=(n)=>{ if(!n) return ''; const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };
 const changedCar=(t,car)=> car && (t.change_status||'').includes('#'+car);
 teamsGrid.innerHTML=d.teams.map(t=>{
   const roster=(t.roster && t.roster.length) ? t.roster : (t.drivers || []);
   const isLocked=!!t.locked || (t.change_status||'').toLowerCase().includes('locked');
   return `<div class="mini-card team-card ${isLocked ? 'locked-team' : ''}">
     <h3>${isLocked ? '🔒 ' : ''}${t.display_name || ('Team ' + t.id + ' – ' + t.name)}</h3>
     <p class="drafted">Drafted ${ordinal(t.draft_position || t.drafted)}</p>
     <p><strong>Segment Points:</strong> ${t.segment_points || t.segment_total || t.points || 0}</p>
     <ul class="roster">${roster.map(dr=>{
       const driverName=getDriverName(dr), carNumber=getCarNumber(dr), cls=changedCar(t,carNumber) ? 'changed-car' : 'car';
       return `<li><span>${carNumber ? '<span class="'+cls+'">#'+carNumber+'</span> ' : ''}${driverName}</span></li>`;
     }).join('')}</ul>
     ${t.change_status ? `<div class="change-note"><strong>Change Used:</strong> ${t.change_status.replace('Locked - used change: ','')}</div>` : ''}
   </div>`;
 }).join('');
})();</script>
